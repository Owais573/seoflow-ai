version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: seoflow_postgres
    restart: always
    environment:
      POSTGRES_USER: seoflow_user
      POSTGRES_PASSWORD: seoflow_password
      POSTGRES_DB: seoflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: seoflow_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: seoflow_n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data:
